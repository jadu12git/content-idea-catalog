<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idea Atlas | Content Idea Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="is-loading">
    <div class="loading-screen" id="loading-screen" aria-live="polite">
      <svg class="loading-bg-svg" viewBox="0 0 1440 900" aria-hidden="true">
        <defs>
          <linearGradient id="loadingStrokeA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(124,157,255,0.05)" />
            <stop offset="100%" stop-color="rgba(168,85,247,0.35)" />
          </linearGradient>
          <linearGradient id="loadingStrokeB" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(52,211,153,0.06)" />
            <stop offset="100%" stop-color="rgba(124,157,255,0.28)" />
          </linearGradient>
        </defs>
        <circle class="loading-bg-ring loading-bg-ring-a" cx="240" cy="700" r="220" />
        <circle class="loading-bg-ring loading-bg-ring-b" cx="1140" cy="180" r="180" />
        <path
          class="loading-bg-path loading-bg-path-a"
          d="M-40 622C132 498 242 450 374 456C542 464 618 620 788 628C970 636 1104 468 1480 534"
        />
        <path
          class="loading-bg-path loading-bg-path-b"
          d="M-60 312C116 210 278 162 424 188C600 218 730 360 890 358C1076 356 1202 210 1488 258"
        />
        <path
          class="loading-bg-path loading-bg-path-c"
          d="M168 108C318 120 466 192 560 282C654 372 774 454 930 468C1088 482 1226 436 1368 354"
        />
      </svg>
      <div class="loading-panel">
        <div class="loading-mark">
          <img src="assets/website_logo.jpg" alt="" aria-hidden="true" />
          <span class="loading-orbit"></span>
        </div>
        <p class="loading-kicker">Idea Atlas</p>
        <p class="loading-line" id="loading-line"></p>
        <p class="loading-subline" id="loading-subline"></p>
        <div class="loading-meter" aria-hidden="true">
          <span class="loading-meter-fill"></span>
        </div>
        <span class="loading-cursor" aria-hidden="true"></span>
      </div>
    </div>

    <div class="background-stage" aria-hidden="true">
      <span class="bg-orb orb-one"></span>
      <span class="bg-orb orb-two"></span>
      <span class="bg-orb orb-three"></span>
      <span class="bg-grid"></span>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner panel">
          <a class="brand" href="#explore-view" aria-label="Idea Atlas home">
            <img class="brand-logo" src="assets/website_logo.jpg" alt="Idea Atlas logo" />
            <div class="brand-copy">
              <span class="brand-label">Idea Atlas</span>
              <strong>Content idea catalog</strong>
            </div>
          </a>

          <nav class="sidebar-nav" aria-label="Catalog views">
            <button class="nav-button is-active" data-view-button="explore" type="button">
              <span>Explore</span>
              <span class="nav-count" id="explore-count">120</span>
            </button>
            <button class="nav-button" data-view-button="saved" type="button">
              <span>Saved</span>
              <span class="nav-count" id="saved-count">0</span>
            </button>
          </nav>

          <section class="sidebar-section" aria-labelledby="niche-heading">
            <div class="sidebar-section-head">
              <h2 id="niche-heading">Niches</h2>
              <button class="text-button" id="clear-niche-button" type="button">All</button>
            </div>
            <div class="niche-list" id="niche-nav"></div>
          </section>

          <section class="sidebar-section compact-stats" aria-label="Catalog overview">
            <article class="compact-stat">
              <span>Total</span>
              <strong id="total-ideas-count">120</strong>
            </article>
            <article class="compact-stat">
              <span>Niches</span>
              <strong id="total-niches-count">12</strong>
            </article>
            <article class="compact-stat">
              <span>Visible</span>
              <strong id="visible-ideas-count">0</strong>
            </article>
          </section>
        </div>
      </aside>

      <main class="main-stage">
        <header class="toolbar panel">
          <div class="toolbar-row">
            <label class="search-field" for="search-input">
              <span class="field-icon" aria-hidden="true">⌕</span>
              <input
                id="search-input"
                type="search"
                autocomplete="off"
                placeholder="Search ideas, tags, goals, or formats"
              />
            </label>

            <div class="toolbar-actions">
              <label class="select-field" for="sort-select">
                <select id="sort-select" aria-label="Sort ideas">
                  <option value="featured">Top picks first</option>
                  <option value="unique">Most unique</option>
                  <option value="engagement">Highest engagement</option>
                  <option value="fastest">Fastest to ship</option>
                  <option value="easiest">Lowest effort</option>
                  <option value="alphabetical">A to Z</option>
                </select>
              </label>

              <label class="select-field" for="format-select">
                <select id="format-select" aria-label="Filter by format">
                  <option value="all">All formats</option>
                </select>
              </label>

              <label class="select-field" for="trend-select">
                <select id="trend-select" aria-label="Filter by style">
                  <option value="all">All styles</option>
                  <option value="trend">Trend ready</option>
                  <option value="evergreen">Evergreen</option>
                </select>
              </label>

              <button class="ghost-button" id="clear-filters-button" type="button">Reset</button>
            </div>
          </div>

          <div class="active-filters" id="active-filters" aria-live="polite"></div>
        </header>

        <section class="view-panel" id="explore-view" aria-label="Explore ideas">
          <section class="section-block">
            <div class="section-head">
              <div>
                <span class="section-kicker">Featured</span>
                <h1>Top picks</h1>
              </div>
              <div class="section-meta">
                <span class="status-pill" id="results-count">0 results</span>
              </div>
            </div>
            <div class="spotlight-grid" id="spotlight-grid"></div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <div>
                <span class="section-kicker">Browse</span>
                <h2>Library</h2>
              </div>
              <button class="ghost-button" id="load-more-button" type="button">Load more</button>
            </div>
            <div class="catalog-grid" id="catalog-grid"></div>
          </section>
        </section>

        <section class="view-panel is-hidden" id="saved-view" aria-label="Saved ideas">
          <div class="section-head">
            <div>
              <span class="section-kicker">Saved</span>
              <h1>Your shortlist</h1>
            </div>
            <button class="ghost-button" id="clear-shortlist-button" type="button">Clear saved</button>
          </div>
          <div class="catalog-grid" id="saved-grid"></div>
          <div class="empty-state is-hidden" id="saved-empty">
            Save cards from Explore to keep your best ideas here.
          </div>
        </section>
      </main>
    </div>

    <script src="ideas-data.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
